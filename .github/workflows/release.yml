name: Release

# Builds the `rustyn64` frontend binary for each supported target, packages it
# with its licences and docs, and publishes a GitHub Release with checksummed
# assets.
#
# Triggered by a v* tag push. workflow_dispatch is available so the packaging
# path can be exercised without minting a tag -- in that mode the build and
# packaging run but the publish job is skipped.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu, ext: "",     archive: tar.gz }
          - { os: macos-latest,   target: aarch64-apple-darwin,     ext: "",     archive: tar.gz }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,   ext: ".exe", archive: zip }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Pinned to the toolchain in rust-toolchain.toml rather than @stable.
      # rust-toolchain.toml takes precedence over the action's default anyway,
      # so @stable meant installing one toolchain and building with another.
      - uses: dtolnay/rust-toolchain@1.96
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: ./.github/actions/linux-build-deps

      - name: Build release binary
        run: cargo build --release -p rustyn64-frontend --target ${{ matrix.target }}

      - name: Smoke-test the binary
        # Catches a binary that links but cannot start (missing runtime symbol,
        # bad dynamic link). --version exits 0 without opening a window, so it
        # runs headless on every platform. Skipped when cross-compiling, since
        # the artifact will not execute on the build host.
        if: matrix.target != 'aarch64-apple-darwin' || runner.arch == 'ARM64'
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/rustyn64${{ matrix.ext }}"
          out="$("$bin" --version)"
          echo "$out"
          case "$out" in
            "rustyn64 "*) echo "smoke test OK" ;;
            *) echo "::error::unexpected --version output: $out"; exit 1 ;;
          esac

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          name="rustyn64-${GITHUB_REF_NAME}-${{ matrix.target }}"
          staging="dist/$name"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/rustyn64" "$staging/"
          cp README.md CHANGELOG.md LICENSE-MIT LICENSE-APACHE NOTICE "$staging/"
          tar -czf "dist/$name.tar.gz" -C dist "$name"
          rm -rf "$staging"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "rustyn64-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          $staging = "dist/$name"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/rustyn64.exe" $staging
          Copy-Item README.md, CHANGELOG.md, LICENSE-MIT, LICENSE-APACHE, NOTICE $staging
          Compress-Archive -Path $staging -DestinationPath "dist/$name.zip"
          Remove-Item -Recurse -Force $staging

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish release
    needs: build
    # Only a real tag publishes. A manual dispatch stops after packaging so the
    # pipeline can be exercised without creating a release.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      # fetch-depth 0 plus an explicit tag fetch: the default shallow checkout
      # can leave the annotated tag OBJECT unavailable, which would make the
      # `git tag -l --format=%(contents)` read below come back empty and
      # silently fall through to auto-generated notes.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd dist
          # Name the archive types explicitly so SHA256SUMS can never checksum
          # itself on a re-run.
          sha256sum ./*.tar.gz ./*.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Verify tag matches Cargo.toml version
        # A tag that disagrees with the manifest ships mislabelled artifacts.
        run: |
          set -euo pipefail
          manifest=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          tag="${GITHUB_REF_NAME#v}"
          if [ "$manifest" != "$tag" ]; then
            echo "::error::tag v$tag does not match workspace version $manifest"
            exit 1
          fi
          echo "version $manifest matches tag"

      - name: Resolve the release notes
        # Precedence, most specific first:
        #   1. docs/release-notes/<tag>.md  -- the long-form notes, reviewed in a
        #      PR like any other doc rather than typed into a tag message.
        #   2. the annotated tag body       -- for a patch cut without its own file.
        #   3. --generate-notes             -- last resort; an auto commit list.
        # The tag annotation stays short and points at the file; see
        # to-dos/VERSION-PLAN.md.
        run: |
          set -euo pipefail
          notes="docs/release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$notes" ]; then
            cp "$notes" "$RUNNER_TEMP/release-notes.md"
            echo "using $notes ($(wc -l < "$notes") lines)"
            echo "have_body=true" >> "$GITHUB_ENV"
            exit 0
          fi
          body=$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")
          if [ -n "${body//[[:space:]]/}" ]; then
            printf '%s\n' "$body" > "$RUNNER_TEMP/release-notes.md"
            echo "no $notes; using the tag annotation instead"
            echo "have_body=true" >> "$GITHUB_ENV"
          else
            echo "no $notes and no tag annotation; falling back to --generate-notes"
            echo "have_body=false" >> "$GITHUB_ENV"
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists; uploading assets only"
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          elif [ "${have_body}" = "true" ]; then
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "RustyN64 $GITHUB_REF_NAME" \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              --verify-tag
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "RustyN64 $GITHUB_REF_NAME" \
              --generate-notes \
              --verify-tag
          fi
