name: CI

# Cost/time optimisation: the expensive legs (the macOS/Windows matrix and the
# `test-roms` accuracy battery) run only on release-class events -- push to the
# default branch, the merge queue, manual dispatch, a weekly drift-net cron, and
# `release/*` PRs -- and are SKIPPED on ordinary feature PRs, which get only the
# fast essential gates (fmt/clippy/rustdoc, the ubuntu unit tests, no_std). The
# full suite still runs on every merge to `main`, on release PRs, and weekly, so
# nothing ships unproven. See the `setup` job for the light/full decision.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  merge_group:
  # Weekly drift safety-net: re-run the FULL suite on `main` so a regression
  # merged between releases is caught within a week regardless of cadence.
  schedule:
    - cron: "0 7 * * 1"

# Cancel superseded PR-branch runs (rapid pushes); let every other run finish.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Compute one "full-run" flag + the OS matrix. LIGHT (ubuntu-only, no
  # test-roms) for a regular feature PR; FULL (adds macOS/Windows + the
  # test-roms battery) for push-to-main, the merge queue, dispatch, the weekly
  # cron, and release/* PRs.
  setup:
    name: select matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      os: ${{ steps.pick.outputs.os }}
      full: ${{ steps.pick.outputs.full }}
    steps:
      - id: pick
        shell: bash
        # Pass event/ref via env (NOT ${{ }} interpolation into run:) so a branch
        # name can't inject shell -- the actions/script-injection pattern CodeQL flags.
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] && [[ "$HEAD_REF" != release/* ]]; then
            echo 'full=false' >> "$GITHUB_OUTPUT"
            echo 'os=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          else
            echo 'full=true' >> "$GITHUB_OUTPUT"
            echo 'os=["ubuntu-latest", "macos-latest", "windows-latest"]' >> "$GITHUB_OUTPUT"
          fi

  test:
    name: test (${{ matrix.os }})
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.setup.outputs.os) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.97
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/linux-build-deps
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  rustdoc:
    name: rustdoc (-D warnings)
    # Its OWN job, deliberately, for two reasons learned the hard way.
    #
    # 1. It used to be the LAST step of the `test` job, after the slow test run.
    #    That made it the most likely thing to be lost when a follow-up push
    #    cancelled the run (`cancel-in-progress` below), and in practice a commit
    #    with a broken intra-doc link sailed through because the run was
    #    CANCELLED before rustdoc ever executed -- not because it passed.
    # 2. A rustdoc failure reported as "test (ubuntu-latest) failed", which
    #    points at the wrong thing. Now the job name says what broke.
    #
    # No `needs:`, so it starts immediately and finishes in well under a minute
    # -- fast enough to be genuinely useful feedback, and small enough that it is
    # rarely mid-flight when a supersede happens.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.97
      - uses: Swatinem/rust-cache@v2
      # rustdoc builds the whole workspace including the frontend, so the
      # alsa/udev headers its build scripts need must be present.
      - uses: ./.github/actions/linux-build-deps
      # -D warnings turns every rustdoc lint into an error: broken intra-doc
      # links, public docs linking to private items, and missing docs on public
      # items (the workspace sets `missing_docs = "warn"`).
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

  test-roms:
    name: test (test-roms feature)
    # The heavy accuracy-ROM battery -- FULL-run only (skipped on ordinary
    # feature PRs, runs on push-to-main / merge queue / dispatch / weekly cron /
    # release PRs). This is the single biggest per-PR time saving.
    needs: setup
    if: ${{ needs.setup.outputs.full == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.97
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/linux-build-deps
      # Assert the feature actually reached the harness rather than trusting the
      # exit code. A sibling project hit a Cargo feature-unification quirk where
      # this exact command exited 0 while silently never enabling `test-roms` for
      # its harness crate, so the ROM-oracle gate ran nothing and still reported
      # green. An oracle that runs zero tests looks identical to one that passes,
      # so the exit code cannot distinguish them -- only the probe can.
      - name: Run the test-ROM battery, and prove the feature was on
        run: |
          set -euo pipefail
          cargo test --workspace --features test-roms 2>&1 | tee /tmp/test-roms.log
          if ! grep -q "probe_test_roms_feature_is_enabled ... ok" /tmp/test-roms.log; then
            echo "::error::the test-roms feature did not reach rustyn64-test-harness -- the battery ran nothing"
            exit 1
          fi
          echo "test-roms feature confirmed active in the harness"

  no_std:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.97
        with:
          targets: thumbv7em-none-eabihf
      - run: cargo build -p rustyn64-core --target thumbv7em-none-eabihf --no-default-features

  no-commercial-roms:
    name: no commercial ROMs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      # Layer 3 of the ROM guard (see .gitignore and the pre-commit hook).
      # Server-side and unskippable: a contributor can bypass the local hook
      # with --no-verify, but not this. Scans the whole tracked tree, so it
      # also catches a ROM that slipped in via an earlier commit.
      - run: bash scripts/check_no_roms.sh

  microcode-blob:
    name: microcode blob integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      # The vendored rdpq microcode is committed as a generated blob (assembled
      # from third_party/libdragon-rsp/ with the mips64-elf toolchain). This
      # toolchain-free gate catches a corrupted or hand-edited blob by checking
      # it against its committed checksum. Full source->blob reassembly is the
      # local assemble.sh step (see third_party/libdragon-rsp/NOTICE.md).
      - run: bash scripts/check_microcode_blob.sh

  no-conflict-markers:
    name: no conflict markers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      # A `|||||||` diff3 marker was once committed into CHANGELOG.md and would
      # have shipped into the release notes: the resolution handled the three
      # familiar markers but not the diff3 middle section, and a stray line is
      # valid Markdown so nothing downstream complained.
      - run: bash scripts/check_no_conflict_markers.sh

  wasm-bindgen-pin:
    name: trunk pin matches Cargo.lock
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      # Trunk resolves the wasm-bindgen CLI from its own pin, which must equal
      # the wasm-bindgen LIBRARY version cargo resolved. A mismatch fails the
      # wasm build at bindgen time -- but nothing else notices, so the pin drifts
      # silently on any dependency bump that moves wasm-bindgen. This is the
      # cheap guard: no toolchain, no network, just the two numbers.
      - name: Compare Trunk.toml pin against Cargo.lock
        run: |
          set -euo pipefail
          trunk_toml=crates/rustyn64-frontend/web/Trunk.toml
          lock=$(python3 - <<'PY'
          import re
          for blk in open("Cargo.lock").read().split("[[package]]"):
              if re.search(r'name = "wasm-bindgen"\s*$', blk, re.M):
                  print(re.search(r'version = "([^"]+)"', blk).group(1))
                  break
          PY
          )
          pin=$(grep -oP 'wasm_bindgen\s*=\s*"\K[^"]+' "$trunk_toml")
          echo "Cargo.lock wasm-bindgen : $lock"
          echo "Trunk.toml  wasm_bindgen: $pin"
          if [ "$lock" != "$pin" ]; then
            echo "::error file=$trunk_toml::wasm_bindgen pin $pin != Cargo.lock $lock -- update the pin"
            exit 1
          fi
          echo "pin matches"
