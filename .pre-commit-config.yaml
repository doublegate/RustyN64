repos:
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.1
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]
  - repo: local
    hooks:
      - id: fmt
        name: cargo fmt
        entry: cargo fmt --all --check
        language: system
        pass_filenames: false

      # Layer 2 of 3 guarding against committing a commercial ROM (see
      # .gitignore and the no-commercial-roms CI job). This fires on the staged
      # file list, so it still catches a ROM added with `git add -f`, which
      # bypasses .gitignore entirely.
      - id: no-commercial-roms
        name: block commercial ROM commits
        entry: scripts/check_no_roms.sh
        language: system
        pass_filenames: true

      # A `|||||||` diff3 marker once reached a commit and would have shipped
      # into the release notes. A stray marker line is valid Markdown and valid
      # in a comment, so nothing downstream complains -- it needs its own check.
      - id: no-conflict-markers
        name: block merge-conflict markers
        entry: scripts/check_no_conflict_markers.sh
        language: system
        pass_filenames: false

      # A commercial N64 ROM is 4-64 MB. Nothing legitimately committed to this
      # repo is that big, so a size ceiling catches renamed or unknown-extension
      # ROMs that the extension check would miss.
      - id: no-large-files
        name: block large files
        entry: scripts/check_no_roms.sh --size-only
        language: system
        pass_filenames: true
